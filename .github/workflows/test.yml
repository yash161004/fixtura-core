name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,eval]"
        
    - name: Check for unpublishable git dependencies
      run: |
        if grep -q "@ git+" pyproject.toml; then
          echo "ERROR: pyproject.toml contains unpublishable git+ dependencies."
          exit 1
        fi
        
    - name: Run mypy
      run: |
        mypy . --strict
        
    - name: Run pytest
      run: |
        pytest -v
